<!DOCTYPE html>
<html>

<head>
<title>Company Register</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

</head>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-lg p-4">
                <div class="text-center mb-4">
                    <h2 style="color: #6b0000;">Company Sign Up</h2>
                    <p class="text-muted">Register to start hiring</p>
                </div>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Company Name</label>
                        <input type="text" name="company_name" class="form-control" placeholder="Enter company name" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Official Email</label>
                        <input type="email" name="email" class="form-control" placeholder="hr@company.com" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" placeholder="Create a password" required>
                    </div>
                    <button type="submit" class="btn w-100 py-2 text-white" style="background-color: #6b0000;">Register Company</button>
                    <div class="text-center mt-3">
                        <small>Already registered? <a href="/company_login" style="color: #6b0000;">Login here</a></small>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
</html>
