<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <title>Student Dashboard</title>
</head>
<body>
    <div class="d-flex">
    <!-- Sidebar -->
    <div class="bg-white border-end" style="width: 250px; min-height: 100vh;">
        <div class="sidebar-heading p-4 fs-4 fw-bold" style="color: #6b0000;">Student Portal</div>
        <div class="list-group list-group-flush">
            <a href="#" class="list-group-item list-group-item-action p-3 active" style="background-color: #6b0000; border: none;">Available Drives</a>
            <a href="#" class="list-group-item list-group-item-action p-3">My Applications</a>
            <a href="#" class="list-group-item list-group-item-action p-3">Placement History</a>
            <a href="#" class="list-group-item list-group-item-action p-3">Edit Profile</a>
            <a href="/logout" class="list-group-item list-group-item-action p-3 text-danger">Logout</a>
        </div>
    </div>
    <!-- Page Content -->
    <div class="container-fluid p-4 bg-light">
        <h4 class="mb-4">Recommended for You</h4>
        <div class="row g-4">
            <!-- Drive Card -->
            <div class="col-md-6 col-lg-4">
                <div class="card border-0 shadow-sm h-100">
                    <div class="card-body">
                        <h5 class="card-title">Google India</h5>
                        <p class="text-muted small">Role: Data Scientist | CTC: 25 LPA</p>
                        <hr>
                        <div class="d-flex justify-content-between">
                            <span class="badge bg-info text-dark">Deadline: 20 Oct</span>
                            <button class="btn btn-sm text-white" style="background-color: #6b0000;">Apply Now</button>
                        </div>
                    </div>
                </div>
            </div>
            <!-- Status Card -->
            <div class="col-md-12 mt-5">
                <h5>My Application Status</h5>
                <div class="card border-0 shadow-sm p-3">
                    <table class="table">
                        <thead><tr><th>Company</th><th>Drive</th><th>Status</th></tr></thead>
                        <tbody>
                            <tr>
                                <td>Microsoft</td><td>SDE Intern</td>
                                <td><span class="badge bg-warning text-dark">Shortlisted</span></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
