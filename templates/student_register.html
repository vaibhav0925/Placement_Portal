<!DOCTYPE html>
<html>
<head>
<title>Student Register</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

</head>

<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-lg p-4">
                <div class="text-center mb-4">
                    <h2 style="color: #6b0000;">Student Sign Up</h2>
                    <p class="text-muted">Create your placement profile</p>
                </div>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Full Name</label>
                        <input type="text" name="name" class="form-control" placeholder="Enter your full name" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email Address</label>
                        <input type="email" name="email" class="form-control" placeholder="name@smail.iitm.ac.in" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" placeholder="Create a strong password" required>
                    </div>
                    <button type="submit" class="btn w-100 py-2 text-white " style="background-color: #6b0000;">Create Account</button>
                    <div class="text-center mt-3">
                        <small>Already registered? <a href="/student_login" style="color: #6b0000;">Login here</a></small>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
