<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <title>Admin Dashboard</title>
</head>
<body>
    <div class="d-flex" id="wrapper">
    <!-- Sidebar -->
    <div class="bg-white border-end" id="sidebar-wrapper" style="width: 250px; min-height: 100vh;">
        <div class="sidebar-heading p-4 fs-4 fw-bold" style="color: #6b0000;">Admin Portal</div>
        <div class="list-group list-group-flush">
            <a href="#" class="list-group-item list-group-item-action p-3 active" style="background-color: #6b0000; border: none;">Dashboard</a>
            <a href="#" class="list-group-item list-group-item-action p-3">Manage Students</a>
            <a href="#" class="list-group-item list-group-item-action p-3">Manage Companies</a>
            <a href="#" class="list-group-item list-group-item-action p-3">Placement Drives</a>
            <a href="#" class="list-group-item list-group-item-action p-3 text-danger">Logout</a>
        </div>
    </div>
    <!-- Page Content -->
    <div class="container-fluid p-4 bg-light">
        <div class="row g-4 mb-4">
            <div class="col-md-3"><div class="card shadow-sm p-3 border-0 text-center"><h6 class="text-muted">Students</h6><h2 style="color: #6b0000;">1,240</h2></div></div>
            <div class="col-md-3"><div class="card shadow-sm p-3 border-0 text-center"><h6 class="text-muted">Companies</h6><h2 style="color: #6b0000;">85</h2></div></div>
            <div class="col-md-3"><div class="card shadow-sm p-3 border-0 text-center"><h6 class="text-muted">Applications</h6><h2 style="color: #6b0000;">4,102</h2></div></div>
            <div class="col-md-3"><div class="card shadow-sm p-3 border-0 text-center"><h6 class="text-muted">Drives</h6><h2 style="color: #6b0000;">32</h2></div></div>
        </div>
        <div class="card shadow-sm border-0 p-4">
            <h5 class="mb-3">Pending Company Approvals</h5>
            <table class="table align-middle">
                <thead><tr><th>Company</th><th>Email</th><th>Action</th></tr></thead>
                <tbody>
                    <tr>
                        <td>Tech Corp</td><td>hr@tech.com</td>
                        <td>
                            <button class="btn btn-sm btn-success">Approve</button>
                            <button class="btn btn-sm btn-danger">Reject</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>
