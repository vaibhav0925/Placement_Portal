<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- FIXED LINK TAG BELOW -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <title>Admin Login</title>
</head>
<body style="background-color: #343a40;">
<div class="container mt-5 pt-5">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="card shadow-lg p-4 border-0" style="border-top: 5px solid #6b0000 !important;">
                <div class="text-center mb-4">
                    <h2 style="color: #6b0000;">Admin Login</h2>
                    <p class="text-muted">Placement Cell Access</p>
                </div>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Admin ID</label>
                        <!-- CHANGED name="admin_id" to name="username" TO MATCH YOUR APP.PY -->
                        <input type="text" name="username" class="form-control" placeholder="Enter ID" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn w-100 py-2 text-white" style="background-color: #6b0000;">Secure Login</button>
                </form>
            </div>
            <div class="text-center mt-3">
                <a href="/" class="text-white-50 text-decoration-none small">← Back to Home</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
