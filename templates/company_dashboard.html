<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <title>Company Dashboard</title>
</head>
<body>
    <div class="d-flex">
    <!-- Sidebar -->
    <div class="bg-white border-end" style="width: 250px; min-height: 100vh;">
        <div class="sidebar-heading p-4 fs-4 fw-bold" style="color: #6b0000;">Recruiter Hub</div>
        <div class="list-group list-group-flush">
            <a href="#" class="list-group-item list-group-item-action p-3 active" style="background-color: #6b0000; border: none;">My Drives</a>
            <a href="#" class="list-group-item list-group-item-action p-3">Applicants</a>
            <a href="#" class="list-group-item list-group-item-action p-3">Profile</a>
            <a href="#" class="list-group-item list-group-item-action p-3 text-danger">Logout</a>
        </div>
    </div>
    <!-- Page Content -->
    <div class="container-fluid p-4 bg-light">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4>Active Placement Drives</h4>
            <button class="btn text-white" style="background-color: #6b0000;">+ Create New Drive</button>
        </div>
        <div class="row">
            <div class="col-md-12">
                <div class="card border-0 shadow-sm p-3">
                    <table class="table">
                        <thead class="table-light"><tr><th>Drive Title</th><th>Applicants</th><th>Status</th><th>Actions</th></tr></thead>
                        <tbody>
                            <tr>
                                <td>Software Engineer - Dev</td>
                                <td><span class="badge bg-primary">45 Applied</span></td>
                                <td><span class="badge bg-success">Approved</span></td>
                                <td><button class="btn btn-sm btn-outline-dark">View Applicants</button> <button class="btn btn-sm btn-outline-danger">Close</button></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
