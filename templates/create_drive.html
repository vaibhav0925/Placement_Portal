<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <title>Create Placement Drive</title>
    <style>
        .btn-maroon { background-color: #6b0000; color: white; border: none; }
        .btn-maroon:hover { background-color: #4d0000; color: white; }
    </style>
</head>
<body>
    <div class="d-flex">
        <!-- Sidebar -->
        <div class="bg-white border-end" style="width: 250px; min-height: 100vh;">
            <div class="sidebar-heading p-4 fs-4 fw-bold" style="color: #6b0000;">Recruiter Hub</div>
            <div class="list-group list-group-flush">
                <a href="/company_dashboard" class="list-group-item list-group-item-action p-3">My Drives</a>
                <a href="#" class="list-group-item list-group-item-action p-3">Applicants</a>
                <a href="#" class="list-group-item list-group-item-action p-3">Profile</a>
                <a href="/logout" class="list-group-item list-group-item-action p-3 text-danger">Logout</a>
            </div>
        </div>

        <!-- Form Content -->
        <div class="container-fluid p-4 bg-light">
            <div class="row justify-content-center">
                <div class="col-md-10">
                    <div class="card border-0 shadow-sm p-4">
                        <h3 class="mb-4" style="color: #6b0000;">Post New Placement Drive</h3>
                        <form action="/create_drive" method="POST">
                            <div class="row g-3">
                                <div class="col-md-12">
                                    <label class="form-label fw-bold">Job Title</label>
                                    <input type="text" name="job_title" class="form-control" placeholder="e.g. Software Engineer" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Salary Package (LPA)</label>
                                    <input type="number" step="0.1" name="salary" class="form-control" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Location</label>
                                    <input type="text" name="location" class="form-control" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Deadline</label>
                                    <input type="date" name="deadline" class="form-control" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Drive Date</label>
                                    <input type="date" name="drive_date" class="form-control" required>
                                </div>
                                <div class="col-md-12">
                                    <label class="form-label fw-bold">Eligibility</label>
                                    <textarea name="eligibility" class="form-control" rows="2" required></textarea>
                                </div>
                                <div class="col-md-12">
                                    <label class="form-label fw-bold">Description</label>
                                    <textarea name="description" class="form-control" rows="4" required></textarea>
                                </div>
                                <div class="col-12 mt-4">
                                    <button type="submit" class="btn btn-maroon px-5">Submit for Admin Approval</button>
                                    <a href="/company_dashboard" class="btn btn-outline-secondary px-4 ms-2">Cancel</a>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
